                                        </div>
                                    </div>
                                    <div className="mt-4 bg-[#f8fafc] p-4 rounded-lg border border-[#e2e8f0]">
                                        <h4 className="font-bold text-[#1e293b]"><i className="fas fa-sliders-h mr-2"></i>System
                                            Configuration</h4>
                                        <div className="space-y-2 mt-2">
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="checkbox" defaultChecked className="accent-[#1e293b]" />
                                                Enable Email Notifications
                                            </label>
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="checkbox" defaultChecked className="accent-[#1e293b]" />
                                                Automatic Clearance Archiving
                                            </label>
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="checkbox" className="accent-[#1e293b]" />
                                                Require Secondary Approval
                                            </label>
                                            <label className="flex items-center gap-2 cursor-pointer">
                                                <input type="checkbox" defaultChecked className="accent-[#1e293b]" />
                                                Send SMS Notifications
                                            </label>
                                        </div>
                                        <button onClick={() => showToast('Settings saved successfully!', 'success')} className="btn-primary mt-4">
                                            <i className="fas fa-save mr-2"></i>Save Settings
                                        </button>
                                    </div>
                                    <div className="mt-4 bg-[#f8fafc] p-4 rounded-lg border border-[#e2e8f0]">
                                        <h4 className="font-bold text-[#1e293b]"><i className="fas fa-database mr-2"></i>Data Management
                                        </h4>
                                        <div className="flex flex-wrap gap-2 mt-2">
                                            <button onClick={() => {
                                                    if (window.confirm('Export all data as JSON?')) {
                                                        const data = {
                                                            students: JSON.parse(localStorage.getItem('fuk_students')),
                                                            history: JSON.parse(localStorage.getItem('fuk_history')),
                                                            notifications: JSON.parse(localStorage.getItem(
                                                            'fuk_notifications')),
                                                        };
                                                        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                                                        const url = URL.createObjectURL(blob);
                                                        const a = document.createElement('a');
                                                        a.href = url;
                                                        a.download =
                                                            'fuk_clearance_backup_' + new Date().toISOString().split('T')[0] +
                                                            '.json';
                                                        a.click();
                                                        showToast('Data exported successfully!', 'success');
                                                    }
                                                }} className="btn-accent text-sm px-4 py-2">
                                                <i className="fas fa-download mr-1"></i>Export Data
                                            </button>
                                            <button onClick={() => {
                                                    if (window.confirm('⚠️ This will clear ALL data. Are you sure?')) {
                                                        localStorage.clear();
                                                        window.location.reload();
                                                    }
                                                }} className="btn-danger text-sm px-4 py-2">
                                                <i className="fas fa-trash mr-1"></i>Clear All Data
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    default:
                        return null;
                }
            };

            const adminNav = [
                { key: 'requests', icon: 'fa-tasks', label: 'Requests' },
                { key: 'stats', icon: 'fa-chart-bar', label: 'Statistics' },
                { key: 'settings', icon: 'fa-cog', label: 'Settings' },
            ];

            return (
                <div className="min-h-screen flex items-center justify-center p-4" style={{ background: 'var(--light-bg)' }}>
                    <div className="w-full max-w-6xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col scale-in">
                        <header className="admin-header-bg p-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <Logo />
                                <span className="text-lg font-bold hidden sm:inline">Admin Panel — FUK</span>
                            </div>
                            <div className="text-sm flex items-center gap-3">
                                <span>Admin Dashboard</span>
                                <span className="badge badge-success text-xs">Online</span>
                                <button onClick={logout} className="btn-danger text-xs px-3 py-1">
                                    <i className="fas fa-sign-out-alt mr-1"></i>Logout
                                </button>
                            </div>
                        </header>
                        <div className="flex flex-col md:flex-row flex-1">
                            <nav className="md:w-56 admin-sidebar text-[#cbd5e1] flex md:flex-col p-2 gap-1">
                                {adminNav.map(link => (
                                    <a key={link.key} href="#" onClick={(e) => { e.preventDefault();
                                            setAdminSection(link.key); }}
                                        className={'py-3 px-4 rounded-lg transition flex items-center gap-3 sidebar-link ' + (adminSection === link.key ? 'active' : '')}>
                                        <i className={'fas ' + link.icon + ' w-5 text-center'}></i>
                                        <span className="hidden md:inline">{link.label}</span>
                                        {link.key === 'requests' && totalRequests > 0 &&
                                            <span className="ml-auto bg-[#fbbf24] text-[#1e293b] text-xs px-2 py-0.5 rounded-full">{totalRequests}</span>}
                                    </a>
                                ))}
                                <a href="#" onClick={(e) => { e.preventDefault();
                                        logout(); }}
                                    className="py-3 px-4 rounded-lg transition flex items-center gap-3 hover:bg-[#b91c1c] text-[#cbd5e1] mt-auto">
                                    <i className="fas fa-sign-out-alt w-5 text-center"></i><span className="hidden md:inline">Logout</span>
                                </a>
                            </nav>
                            <main className="flex-1 p-4 md:p-6 overflow-y-auto max-h-[600px] md:max-h-[700px]" style={{ background: 'var(--light-bg)' }}>
                                {renderAdminSection()}
                            </main>
                        </div>
                        <footer className="footer-dark text-center py-3 text-sm">
                            <div className="flex items-center justify-center gap-3">
                                <Logo />
                                <span>&copy; 2025 FUK — Admin Panel v3.0</span>
                            </div>
                        </footer>
                    </div>

                    {/* Add Student Modal */}
                    <Modal isOpen={showAddStudentModal} onClose={() => { setShowAddStudentModal(false);
                            setNewStudentData({ matric: '', name: '', password: 'password123', email: '', phone: '',
                                department: '', faculty: 'Information Technology', level: '100', admissionYear: new Date()
                                    .getFullYear().toString() }); }}
                        title="Add New Student (100-400 Level Only)" size="lg">
                        <div className="space-y-3">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <div>
                                    <label className="form-label">Matric *</label>
                                    <input type="text" className="form-input" placeholder="e.g., IMT/20U/18U/1234"
                                        value={newStudentData.matric} onChange={e => setNewStudentData({ ...newStudentData,
                                            matric: e.target.value })} />
                                </div>
                                <div>
                                    <label className="form-label">Full Name *</label>
                                    <input type="text" className="form-input" placeholder="e.g., John Doe"
                                        value={newStudentData.name} onChange={e => setNewStudentData({ ...newStudentData,
                                            name: e.target.value })} />
                                </div>
                                <div>
                                    <label className="form-label">Email *</label>
                                    <input type="email" className="form-input" placeholder="john@example.com"
                                        value={newStudentData.email} onChange={e => setNewStudentData({ ...newStudentData,
                                            email: e.target.value })} />
                                </div>
                                <div>
                                    <label className="form-label">Phone</label>
                                    <input type="tel" className="form-input" placeholder="+234 800 000 0000"
                                        value={newStudentData.phone} onChange={e => setNewStudentData({ ...newStudentData,
                                            phone: e.target.value })} />
                                </div>
                                <div>
                                    <label className="form-label">Department</label>
                                    <input type="text" className="form-input" placeholder="e.g., Computer Science"
                                        value={newStudentData.department} onChange={e => setNewStudentData({ ...newStudentData,
                                            department: e.target.value })} />
                                </div>
                                <div>
                                    <label className="form-label">Level</label>
                                    <select className="form-input" value={newStudentData.level} onChange={e =>
                                            setNewStudentData({ ...newStudentData, level: e.target.value })}>
                                        {LEVELS.map(level => <option key={level} value={level}>{level} Level</option>)}
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="form-label">Password</label>
                                <input type="text" className="form-input" placeholder="Default: password123"
                                    value={newStudentData.password} onChange={e => setNewStudentData({ ...newStudentData,
                                        password: e.target.value })} />
                            </div>
                            <button onClick={handleAddStudent} className="btn-primary w-full">
                                <i className="fas fa-plus mr-2"></i>Add Student
                            </button>
                        </div>
                    </Modal>

                    {/* Edit Student Modal */}
                    <Modal isOpen={showEditStudentModal} onClose={() => { setShowEditStudentModal(false);
                            setEditingStudent(null); }}
                        title={'Edit Student: ' + editingStudent?.name} size="lg">
                        <div className="space-y-3">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <div>
                                    <label className="form-label">Full Name</label>
                                    <input type="text" className="form-input" value={editStudentData.name}
                                        onChange={e => setEditStudentData({ ...editStudentData, name: e.target.value })} />
                                </div>
                                <div>
                                    <label className="form-label">Email</label>
                                    <input type="email" className="form-input" value={editStudentData.email}
                                        onChange={e => setEditStudentData({ ...editStudentData, email: e.target.value })} />
                                </div>
                                <div>
                                    <label className="form-label">Phone</label>
                                    <input type="tel" className="form-input" value={editStudentData.phone}
                                        onChange={e => setEditStudentData({ ...editStudentData, phone: e.target.value })} />
                                </div>
                                <div>
                                    <label className="form-label">Department</label>
                                    <input type="text" className="form-input" value={editStudentData.department}
                                        onChange={e => setEditStudentData({ ...editStudentData, department: e.target
                                            .value })} />
                                </div>
                                <div>
                                    <label className="form-label">Level</label>
                                    <select className="form-input" value={editStudentData.level}
                                        onChange={e => setEditStudentData({ ...editStudentData, level: e.target.value })}>
                                        {LEVELS.map(level => <option key={level} value={level}>{level} Level</option>)}
                                    </select>
                                </div>
                            </div>
                            <button onClick={handleUpdateStudent} className="btn-primary w-full">
                                <i className="fas fa-save mr-2"></i>Update Student
                            </button>
                        </div>
                    </Modal>
                </div>
            );
        }

        // ─────────────────────────────────────────────────────────────
        //  MAIN APP
        // ─────────────────────────────────────────────────────────────

        function App() {
            const { currentUser, isAdmin } = useApp();

            if (!currentUser) {
                return (
                    <>
                        <LandingPage />
                        <Toast />
                    </>
                );
            }

            return (
                <>
                    {isAdmin ? <AdminDashboard /> : <StudentDashboard />}
                    <Toast />
                </>
            );
        }

        // ─────────────────────────────────────────────────────────────
        //  MOUNT
        // ─────────────────────────────────────────────────────────────

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <AppProvider>
                <App />
            </AppProvider>
        );
    </script>

</body>
</html>
